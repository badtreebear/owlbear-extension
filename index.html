<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude DM Assistant</title>
  <style>
    :root {
      --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
      --accent: #e94560; --text: #eaeaea; --text-muted: #888;
      --hp-green: #4caf50; --hp-yellow: #ff9800;
      --font: 'Georgia', serif; --font-mono: 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    header { background: var(--surface2); padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--accent); }
    .logo { font-size: 18px; filter: drop-shadow(0 0 4px var(--accent)); }
    .title { font-size: 14px; font-weight: bold; letter-spacing: 0.5px; }
    .title span { color: var(--accent); }
    #status { margin-left: auto; font-size: 11px; font-family: var(--font-mono); color: var(--accent); }
    .section { padding: 10px 14px 6px; font-size: 10px; font-family: var(--font-mono); letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid #222; }
    #initiative-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    #initiative-list::-webkit-scrollbar { width: 4px; }
    #initiative-list::-webkit-scrollbar-track { background: var(--bg); }
    #initiative-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    .empty { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; text-align: center; padding: 24px 16px; line-height: 1.8; }
    .initiative-entry { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #1e1e2e; border-left: 3px solid transparent; }
    .initiative-entry.active { background: rgba(233,69,96,0.12); border-left-color: var(--accent); }
    .init-num { font-size: 18px; font-family: var(--font-mono); font-weight: bold; color: var(--accent); min-width: 28px; text-align: center; }
    .init-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .init-name { font-size: 13px; font-weight: bold; }
    .init-hp { font-size: 11px; font-family: var(--font-mono); color: var(--hp-green); }
    .init-conditions { font-size: 10px; color: var(--hp-yellow); font-style: italic; }
    .turn-arrow { color: var(--accent); font-size: 14px; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    footer { border-top: 1px solid #222; padding: 8px 14px; background: var(--surface); }
    .hint { color: var(--text-muted); font-size: 10px; font-family: var(--font-mono); line-height: 1.6; text-align: center; width: 100%; }
    .hint strong { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <span class="logo">⚔️</span>
    <span class="title">Claude <span>DM</span></span>
    <span id="status">Connecting...</span>
  </header>
  <div class="section">Initiative Order</div>
  <div id="initiative-list">
    <div class="empty">No initiative set.<br>Right-click tokens to add.</div>
  </div>
  <footer>
    <div class="hint">
      <strong>Right-click tokens</strong> to set HP &amp; speed<br>
      Tell Claude what you do — it handles the rest
    </div>
  </footer>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
